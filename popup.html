<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
:root {
  --bg:#0a0c0f; --bg2:#111318; --bg3:#181c22;
  --bd:#1e2530; --bd2:#2a3040;
  --tx:#c8d0dc; --tx2:#6b7a8d;
  --red:#e31837; --blue:#1034a6; --purple:#8080ff; --orange:#ff9900; --paypal:#0070ba;
  --font-main: 'Roboto', sans-serif;
  --font-mono: 'Roboto', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{width:400px;background:var(--bg);color:var(--tx);font-family:var(--font-main);font-size:12px;padding-bottom:10px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg2);border-bottom:1px solid var(--bd)}

.logo{display:flex;align-items:center;gap:7px}

/*.logo{font-weight:700;text-transform:uppercase;letter-spacing:1px}.logo em{color:var(--red);font-style:normal}*/

.logo-box{width:22px;height:18px;background:var(--red);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.logo-text em{color:var(--red);font-style:normal}
.top-bar{padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
#status-dot{width:6px;height:6px;border-radius:50%;background:#333}
#status-dot.active{background:var(--red);box-shadow:0 0 8px var(--red)}
#scan-url{font-size:10px;color:var(--tx2);font-family:var(--font-mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.content{padding:12px;display:flex;flex-direction:column;gap:15px}
.card-section{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;overflow:hidden;display:none}
.section-label{font-size:10px;font-weight:700;padding:6px 10px;background:var(--bg3);text-transform:uppercase}
.shell .section-label{color:var(--red);border-left:3px solid var(--red)}
.stripe .section-label{color:var(--purple);border-left:3px solid var(--purple)}
.amazon .section-label{color:var(--orange);border-left:3px solid var(--orange)}
.paypal .section-label{color:var(--paypal);border-left:3px solid var(--paypal)}
.field-row{display:flex;padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.03)}
.field-row:last-child{border-bottom:none}
.field-label{width:160px;color:var(--tx2);font-size:10px;text-transform:none;flex-shrink:0}
.field-value{font-family:var(--font-mono);font-size:11px;color:var(--tx);cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.field-value:hover{color:#fff;background:rgba(255,255,255,0.05)}
#waiting {text-align:center;padding:20px;color:var(--tx2);font-style:italic}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <div class="logo-box">FSH</div>
    <div class="logo-text">FAKE<em>SHOP</em> HUNTER 
    <span style="font-size: 8px; font-weight: normal; text-transform: none; color: var(--tx2); margin-left: 5px;">v.2.2.0</span></div></div></div>
<div class="top-bar"><div id="status-dot"></div><div id="scan-url">...</div></div>
<div id="content" class="content">
  <div id="sec-shell" class="card-section shell"><div class="section-label">Shell Company</div><div id="fields-shell"></div></div>
  <div id="sec-stripe" class="card-section stripe"><div class="section-label">Stripe</div><div id="fields-stripe"></div></div>
  <div id="sec-amazon" class="card-section amazon"><div class="section-label">Amazon Pay</div><div id="fields-amazon"></div></div>
  <div id="sec-paypal" class="card-section paypal"><div class="section-label">PayPal</div><div id="fields-paypal"></div></div>
  <div id="waiting">Waiting for responses...</div>
</div>
<script src="popup.js"></script>
</body>
</html>
